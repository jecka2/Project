---
# Установка необходимых пакетов для работы с postgres и пользователями
- name: install base tools
  apt:
    name:
     - python3-pexpect
     - python3-psycopg2
     - bash-completion 
     - wget
     - prometheus-node-exporter 
    state: present
    update_cache: true

  #  Установка пакетов barman и postgresql-client на сервер Backup 
- name: install barman and postgresql packages on Backup
  apt:
    name:
      - barman
      - barman-cli
      - postgresql
    state: present
    update_cache: true
  when: (ansible_hostname == "Backup")

 #  Установка пакетов barman-cli на серверах Main и Repl 
- name: install barman-cli and postgresql packages on nodes
  apt:
    name:
      - barman-cli
    state: present
    update_cache: true
  when: (ansible_hostname != "Backup")
 
#  Генерируем SSH-ключ для пользователя barman на хосте Backup
- name: generate SSH key for barman
  user:
    name: barman
    uid: 994
    shell: /bin/bash
    generate_ssh_key: yes
    ssh_key_type: rsa
    ssh_key_bits: 4096
    force: no
  when: (ansible_hostname == "Backup")

  #  Забираем содержимое открытого ключа barman c хоста Backup 
- name: fetch all public ssh keys Backup
  shell: cat /var/lib/barman/.ssh/id_rsa.pub
  register: ssh_keys
  when: (ansible_hostname == "Backup")

 #  Копируем ключ с Main на Backup
- name: Transfer public key to Backup with a comment
  delegate_to: Main
  authorized_key:
     key: "{{ ssh_keys.stdout }}"
     user: postgres
     exclusive: yes # Добавляет новый ключ поверх существующих ключей
     state: present
     manage_dir: yes # Создает каталог ~/.ssh, если его нет
  when: ansible_hostname == 'Backup'

- name: Transfer public key to Backup with a comment
  delegate_to: Repl
  authorized_key:
     key: "{{ ssh_keys.stdout }}"
     user: postgres
     exclusive: yes # Добавляет новый ключ поверх существующих ключей
     state: present
     manage_dir: yes # Создает каталог ~/.ssh, если его нет
  when: ansible_hostname == 'Backup'

  # Добавляем разрешения для подключения с хоста Backup
- name: Add permission for Backup
  lineinfile:
     path: /var/lib/postgresql/16/main/pg_hba.conf
     line: 'host    all   {{ barman_user }}    {{ Backup_ip }}/32    scram-sha-256'
  when: (ansible_hostname == "Main") or
         (ansible_hostname == "Repl") 

  # Добавляем разрешения для подключения с хоста Backup
- name: Add permission for Backup
  lineinfile:
     path: /var/lib/postgresql/16/main/pg_hba.conf
     line: 'host    replication   {{ barman_user }}    {{ Backup_ip }}/32    scram-sha-256'
  when: (ansible_hostname == "Main") or
        (ansible_hostname == "Repl") 

  # Перезагружаем службу postgresql-server
- name: restart postgresql-server on Main
  service: 
    name: postgresql-14
    state: restarted
  when: (ansible_hostname == "Main")


   # Копируем файл .pgpass
- name: copy .pgpass
  template:
    src: .pgpass.j2
    dest: /var/lib/barman/.pgpass
    owner: barman
    group: barman
    mode: '0600'
  when: (ansible_hostname == "Backup")

  # Копируем файл barman.conf
- name: copy barman.conf
  template:
    src: barman.conf.j2
    dest: /etc/barman.conf 
    owner: barman
    group: barman
    mode: '0755'
  when: (ansible_hostname == "Backup")

 # Копируем файл Repl.conf
- name: copy Relp.conf
  template:
    src: repl.conf.j2
    dest: /etc/barman.d/Repl.conf
    owner: barman
    group: barman
    mode: '0755'
  when: (ansible_hostname == "Backup")

- name: barman switch-wal Repl
  become_user: barman
  shell: barman switch-wal Repl
  when: (ansible_hostname == "Backup")

- name: barman cron
  become_user: barman
  shell: barman cron
  when: (ansible_hostname == "Backup")

- name: Create alert rules directory
  file:
   path: /etc/prometheus/alerts
   state: directory
   owner: prometheus
   group: prometheus
   mode: '0755'

- name: Copy alert rules
  copy:
   src: "files/alert-rules.yml"
   dest: /etc/prometheus/alerts/
   owner: prometheus
   group: prometheus
   mode: '0644'
  notify: restart prometheus

- name: Display access information
  debug:
    msg:
     - "Grafana: http://{{ ansible_host }}:3000 (admin/{{ grafana_password }})"
     - "Prometheus: http://{{ ansible_host }}:9090"
     - "Alertmanager: http://{{ ansible_host }}:9093"

- name: Copy deb files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /tmp/
  loop:
   - elasticsearch.deb
   - logstash.deb
   - kibana.deb
   - filebeat.deb


- name: Install elk debs
  ansible.builtin.apt:
   deb: "{{ item }}"
  loop:
   - /tmp/elasticsearch.deb
   - /tmp/logstash.deb
   - /tmp/kibana.deb
   - /tmp/filebeat.deb

- name: Настройка Elasticsearch
  template:
     src: elasticsearch.yml.j2
     dest: /etc/elasticsearch/elasticsearch.yml
     owner: root
     group: root
     mode: '0644'

- name: Настройка Kibana
  template:
    src: kibana.yml.j2
    dest: /etc/kibana/kibana.yml
    owner: root
    group: root
    mode: '0644'

- name: Настройка Logstash
  template:
    src: logstash.conf.j2
    dest: /etc/logstash/conf.d/logstash.conf
    owner: root
    group: root
    mode: '0644'

- name: Enable service httpd, and not touch the state
  ansible.builtin.service:
    name: "{{ item }}"
    enabled: true
    state: 'started'
  loop:
     - kibana
     - logstash
     - filebeat
     - elasticsearch 



   - name: Update apt package cache
     ansible.builtin.apt:
       update_cache: true

   - name: Install prometheus
     ansible.builtin.apt:
       name: prometheus
       state: present

   - name: Copy prometheus configs
     ansible.builtin.template:
      src: prometheus.yml.j2
      dest: /etc/prometheus/prometheus.yml
      owner: prometheus
      group: prometheus
      mode: '0600'
     notify: restart prometheus

